<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職涯教練陪跑 · 教練媒合測驗</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #3A71B9;
      --blue-dark:   #234E95;
      --blue-sky:    #4FACF4;
      --blue-pale:   #E4F3FE;
      --blue-light:  #EBF4FE;
      --yellow:      #F6C954;
      --orange:      #ED7738;
      --white:       #FFFFFF;
      --bg:          #F0F7FF;
      --text:        #1A2E4A;
      --muted:       #5C7A9B;
      --border:      #C8DFF5;
      --green:       #1C7C4A;
      --green-bg:    #D6F5E5;
      --card-shadow: 0px 4px 24px 0px rgba(58,113,185,0.13);
    }

    body {
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── PAGE WRAPPER ─── */
    .page {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ─── HERO ─── */
    .hero {
      width: 100%;
      height: 275px;
      background-color: #3A71B9;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    /* Lines rendered via inline SVG — no ::before needed */
    .hero::before { display: none; }
    .hero::after  { display: none; }

    /* Hero SVG lines layer */
    .hero-lines {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    /* Top-right ellipse */
    .hero-ellipse-tr {
      position: absolute;
      width: 140px; height: 160px;
      left: 287px; top: -15px;
      background: radial-gradient(ellipse at center, rgba(79,172,244,0.25) 0%, rgba(79,172,244,0) 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    /* Bottom-left ellipse */
    .hero-ellipse-bl {
      position: absolute;
      width: 180px; height: 140px;
      left: -43px; top: 164px;
      background: radial-gradient(ellipse at center, rgba(246,201,84,0.25) 0%, rgba(246,201,84,0) 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    /* Center content stack */
    .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 50px;
      gap: 32px;
      z-index: 1;
    }
    .hero-title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    /* AAPD Logo image */
    .hero-aapd-img {
      width: 73px;
      height: 17px;
      object-fit: contain;
      object-position: center;
      flex-shrink: 0;
    }
    /* AAPD text fallback */
    .hero-aapd-fallback {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.18em;
      display: none;
    }
    /* Title artwork image */
    .hero-title-img {
      width: 228px;
      height: 110px;
      object-fit: contain;
    }
    /* Hero badge pill */
    .hero-badge {
      display: inline-flex;
      align-items: center;
      background: #F6C954;
      color: #234E95;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 100px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

        /* ─── CONTENT AREA ─── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 24px 16px 40px;
    }

    /* ─── SCREENS ─── */
    .screen { display: none; width: 100%; }
    .screen.active { display: block; }

    /* ─── CARD ─── */
    .card {
      width: 100%;
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }
    .card-accent {
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--blue-sky) 55%, var(--yellow) 100%);
    }
    .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── BUTTONS ─── */
    .btn-primary {
      width: 100%;
      background: var(--blue-dark);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-orange {
      width: 100%;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }
    .btn-orange:hover { opacity: 0.88; }


    /* ─── INTRO SCREEN ─── */
    .intro-title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      color: var(--blue);
    }
    .intro-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--blue);
      line-height: 38px;
      letter-spacing: 0.01em;
      text-align: center;
    }
    .intro-sub {
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      line-height: 22px;
      text-align: center;
    }
    .intro-sub p { margin: 0; }
    .pills-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    .pill {
      background: var(--blue-pale);
      color: var(--blue);
      border: none;
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ─── QUESTION SCREEN ─── */
    /* Progress pills (6 segments) */
    .progress-pills {
      display: flex;
      gap: 6px;
      align-items: center;
      width: 100%;
    }
    .progress-pill {
      flex: 1;
      height: 6px;
      border-radius: 100px;
      background: var(--border);
      transition: background 0.3s ease;
    }
    .progress-pill.done    { background: var(--blue); }
    .progress-pill.current { background: var(--yellow); }

    .question-text {
      font-size: 26px;
      font-weight: 800;
      color: var(--blue);
      line-height: 38px;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .option-btn {
      width: 100%;
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 24px 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: rgba(35, 78, 149, 0.7);
      text-align: center;
      cursor: pointer;
      line-height: 1.5;
      transition: all 0.15s;
    }
    .option-btn:hover { background: var(--blue-light); border-color: var(--border); color: var(--blue); }
    .option-btn.selected {
      background: var(--blue-light);
      border: 2.5px solid var(--blue);
      border-radius: 12px;
      color: var(--blue);
      font-weight: 700;
    }

    /* ─── CALCULATING SCREEN ─── */
    #calc-inner {
      padding: 40px 24px 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .calc-emoji { font-size: 56px; line-height: 1; }
    .calc-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--blue-dark);
      text-align: center;
    }

    /* Three bounce dots */
    .calc-dots {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .calc-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      animation: dotBounce 1.1s ease-in-out infinite;
    }
    .calc-dot:nth-child(1) { background: var(--blue-dark);  animation-delay: 0s; }
    .calc-dot:nth-child(2) { background: var(--blue-sky);   animation-delay: 0.18s; }
    .calc-dot:nth-child(3) { background: var(--yellow);     animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%, 70%, 100% { transform: translateY(0);    opacity: 0.7; }
      35%            { transform: translateY(-9px); opacity: 1;   }
    }

    /* ─── RESULT SCREEN ─── */
    /* Screen itself becomes a flex column so heading sits above card */
    #screen-result.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .result-heading {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      padding: 0 24px;
      text-align: center;
    }
    .result-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--blue-dark);
      text-align: center;
      width: 100%;
      line-height: 1.35;
    }
    .result-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 20px;
      width: 100%;
    }
    /* Card body for result */
    #result-inner {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .mentor-card {
      width: 100%;
      background: transparent;
      border-radius: 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .mentor-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      width: 100%;
    }
    .mentor-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--blue-dark);
      text-align: center;
    }
    .mentor-company {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .mentor-avatar {
      width: 200px; height: 200px;
      border-radius: 12px;
      background: #D3D3D3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .mentor-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }
    .mentor-bio {
      font-size: 14px;
      color: var(--text);
      line-height: 22px;
      text-align: left;
      width: 100%;
    }
    .mentor-tags { display: none; }
    /* result action buttons */
    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .btn-retake {
      width: 100%;
      background: var(--white);
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s;
    }
    .btn-retake:hover { opacity: 0.75; }

    /* ─── SLIDE ANIMATION ─── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen.active .card { animation: slideIn 0.25s ease; }
    #screen-result.active .result-heading { animation: slideIn 0.25s ease; }

    /* ─── DESKTOP BRAND PANEL (hidden on mobile/tablet) ─── */
    .brand-panel { display: none; }
    .brand-panel-ellipse-tr,
    .brand-panel-ellipse-bl,
    .brand-panel-content,
    .brand-divider,
    .brand-tagline,
    .brand-desc,
    .brand-pills,
    .brand-pill { display: none; }

    /* ─────────────────────────────────────────────────────
       TABLET  640px – 1023px
    ───────────────────────────────────────────────────── */
    @media (min-width: 640px) {
      .page { max-width: 600px; }
      .hero { height: 320px; }
      .hero-content { padding-top: 62px; gap: 36px; }
      /* Tablet: scale ellipses slightly */
      .hero-ellipse-tr { width: 170px; height: 190px; left: 510px; }
      .hero-ellipse-bl { width: 220px; height: 170px; left: -50px; top: 210px; }
      .hero-title-img { width: 270px; height: 130px; }
      .hero-aapd-img  { width: 88px; height: 20px; object-fit: contain; }
      .hero-badge     { font-size: 17px; padding: 5px 12px; }
      .content        { padding: 28px 20px 52px; }
      .card-body      { padding: 32px; }
      .intro-title    { font-size: 30px; line-height: 44px; text-align: center; }
      .intro-sub      { font-size: 15px; text-align: center; }
      .question-text  { font-size: 28px; line-height: 42px; }
      .mentor-name    { font-size: 26px; }
      .result-title   { font-size: 20px; }
    }

    /* ─────────────────────────────────────────────────────
       DESKTOP  ≥ 1024px  —  2-column layout
    ───────────────────────────────────────────────────── */
    @media (min-width: 1024px) {
      body {
        flex-direction: row;
        align-items: stretch;
        min-height: 100vh;
        background: var(--bg);
      }

      .page {
        max-width: 100%;
        min-height: 100vh;
        flex-direction: row;
        align-items: stretch;
        background: transparent;
      }

      /* ── Hide mobile/tablet hero ── */
      .hero { display: none !important; }

      /* ── Brand panel (left sticky column) ── */
      .brand-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        width: 500px;
        min-width: 420px;
        flex-shrink: 0;
        min-height: 100vh;
        position: sticky;
        top: 0;
        align-self: flex-start;
        height: 100vh;
        background-color: #3A71B9;
        padding: 64px 56px;
        overflow: hidden;
      }
      /* Brand panel lines via SVG child — no ::before needed */
      .brand-panel::before { display: none; }
      .brand-panel::after  { display: none; }

      /* Top-right ellipse */
      .brand-panel-ellipse-tr {
        display: block;
        position: absolute;
        width: 220px; height: 260px;
        right: -50px; top: -30px;
        background: radial-gradient(ellipse at center, rgba(79,172,244,0.25) 0%, rgba(79,172,244,0) 70%);
        border-radius: 50%;
        pointer-events: none;
      }
      /* Bottom-left ellipse */
      .brand-panel-ellipse-bl {
        display: block;
        position: absolute;
        width: 280px; height: 220px;
        left: -70px; bottom: -50px;
        background: radial-gradient(ellipse at center, rgba(246,201,84,0.25) 0%, rgba(246,201,84,0) 70%);
        border-radius: 50%;
        pointer-events: none;
      }
      .brand-panel-content {
        display: flex;
        flex-direction: column;
        gap: 32px;
        align-items: center;
        position: relative;
        z-index: 1;
        width: 100%;
      }
      /* Logo + artwork sizing inside brand panel */
      .brand-panel .hero-title-block { gap: 16px; align-items: center; }
      .brand-panel .hero-aapd-img    { width: 88px; height: 20px; object-fit: contain; }
      .brand-panel .hero-aapd-fallback { font-size: 15px; }
      .brand-panel .hero-title-img   { width: 310px; height: 150px; }
      .brand-panel .hero-badge       { font-size: 14px; }

      /* brand-divider / tagline / desc / pills hidden on desktop
         (this info lives in the right card, same as mobile/tablet) */
      .brand-divider,
      .brand-tagline,
      .brand-desc,
      .brand-pills { display: none; }

      /* ── Right quiz column ── */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 64px 40px 80px;
        min-height: 100vh;
      }
      /* Constrain screens to card width */
      .screen { max-width: 440px; }

      /* Widen card & increase padding */
      .card-body { padding: 40px; }

      /* Scale up typography */
      .intro-title   { font-size: 28px; line-height: 42px; }
      .question-text { font-size: 28px; line-height: 42px; }
      .mentor-name   { font-size: 26px; }
      .result-title  { font-size: 20px; }

      /* Result screen: keep flex column on desktop */
      #screen-result.active { display: flex; width: 100%; }
      .result-heading { width: 100%; max-width: 440px; padding: 0 24px; }

      /* Intro card: left-align text same as mobile/tablet */
      #screen-intro .intro-title-block { display: flex; }
      #screen-intro .pills-row         { display: flex; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- ═══ DESKTOP BRAND PANEL ═══ -->
  <aside class="brand-panel">
    <!-- Lines: same 11-stroke pattern scaled to full panel height -->
    <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;" viewBox="0 0 500 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

      <line x1="-80" y1="13"  x2="600" y2="13"  stroke="#234E95" stroke-width="10.95" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="25"  x2="600" y2="25"  stroke="#234E95" stroke-width="8.57"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="37"  x2="600" y2="37"  stroke="#234E95" stroke-width="6.70"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="49"  x2="600" y2="49"  stroke="#234E95" stroke-width="5.24"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="61"  x2="600" y2="61"  stroke="#234E95" stroke-width="4.10"  vector-effect="non-scaling-stroke"/>

      <line x1="-80" y1="85"  x2="600" y2="85"  stroke="#234E95" stroke-width="2.51"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="97"  x2="600" y2="97"  stroke="#234E95" stroke-width="1.96"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="109" x2="600" y2="109" stroke="#234E95" stroke-width="1.53"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="121" x2="600" y2="121" stroke="#234E95" stroke-width="1.20"  vector-effect="non-scaling-stroke"/>
      <!-- 第 12–32 條：維持 1.20px，12px 間距 -->
      <line x1="-80" y1="133" x2="600" y2="133" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="145" x2="600" y2="145" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="157" x2="600" y2="157" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="169" x2="600" y2="169" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="181" x2="600" y2="181" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="193" x2="600" y2="193" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="205" x2="600" y2="205" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="217" x2="600" y2="217" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="229" x2="600" y2="229" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="241" x2="600" y2="241" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="253" x2="600" y2="253" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="265" x2="600" y2="265" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="277" x2="600" y2="277" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="289" x2="600" y2="289" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="301" x2="600" y2="301" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="313" x2="600" y2="313" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="325" x2="600" y2="325" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="337" x2="600" y2="337" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="349" x2="600" y2="349" stroke="#234E95" stroke-width="1.20" vector-effect="non-scaling-stroke"/>

//  STATE
// ════════════════════════════════════════════════════
let currentQ = 0;
let answers  = [];

// ════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function renderProgressPills() {
  const container = document.getElementById('progress-pills');
  container.innerHTML = '';
  for (let i = 0; i < QUESTIONS.length; i++) {
    const pill = document.createElement('div');
    pill.className = 'progress-pill';
    if (i < currentQ)        pill.classList.add('done');
    else if (i === currentQ) pill.classList.add('current');
    container.appendChild(pill);
  }
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('q-text').textContent = q.text;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.textContent = opt.label;
    btn.onclick = () => selectOption(i);
    list.appendChild(btn);
  });

  const nextBtn = document.getElementById('btn-next');
  nextBtn.disabled = answers[currentQ] === undefined;
  nextBtn.textContent = currentQ === QUESTIONS.length - 1 ? '查看結果 →' : '下一題 →';
  renderProgressPills();
}

// ════════════════════════════════════════════════════
//  FLOW
// ════════════════════════════════════════════════════
function startQuiz() {
  showScreen('question');
  renderQuestion();
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showCalculating();
  }
}

function showCalculating() {
  showScreen('calc');

  // Clear any leftover fade style from previous run
  const calcCard = document.querySelector('#screen-calc .card');
  calcCard.style.transition = '';
  calcCard.style.opacity    = '';
  calcCard.style.transform  = '';

  // Dots animate automatically via CSS — just wait, then fade out → result
  setTimeout(() => {
    calcCard.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    calcCard.style.opacity    = '0';
    calcCard.style.transform  = 'translateY(-10px)';
    setTimeout(showResult, 360);
  }, 1500);
}

// ════════════════════════════════════════════════════
//  MATCHING
// ════════════════════════════════════════════════════
function computeScores() {
  const scores = {};
  MENTORS.forEach(m => scores[m.id] = 0);
  answers.forEach((optIdx, qIdx) => {
    if (optIdx === undefined) return;
    const chosen = QUESTIONS[qIdx].options[optIdx];
    Object.entries(chosen.scores || {}).forEach(([mid, pts]) => {
      if (scores[mid] !== undefined) scores[mid] += pts;
    });
  });
  return scores;
}

function showResult() {
  const scores = computeScores();
  const sorted = MENTORS.map(m => ({ mentor: m, score: scores[m.id] }))
                        .sort((a, b) => b.score - a.score);
  const top = sorted[0];

  // Populate result card
  const avatarEl = document.getElementById('res-avatar');
  const sharedPhoto = MENTORS.find(m => m.avatarUrl)?.avatarUrl;

    avatarEl.innerHTML = '<img src="' + sharedPhoto + '" alt="' + top.mentor.name + '" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">';
  } else {
    avatarEl.innerHTML = '';
  }
  document.getElementById('res-name').textContent    = top.mentor.name;
  document.getElementById('res-company').textContent = top.mentor.company;
  document.getElementById('res-bio').textContent     = top.mentor.bio;
  const ctaBtn = document.getElementById('res-cta');
  ctaBtn.onclick = () => window.open(top.mentor.ctaUrl || 'https://aapd.com.tw/coach-program', '_blank');

  showScreen('result');

  // ── TRACKING HOOK ─────────────────────────────────
  // 替換為你的分析工具，例如：
  // gtag('event', 'mentor_matched', payload)
  // fetch('/api/track', { method:'POST', body: JSON.stringify(payload) })

    matched_mentor_id:   top.mentor.id,
    matched_mentor_name: top.mentor.name,
    answers: answers.map((optIdx, qIdx) => ({
      question_id: QUESTIONS[qIdx].id,
      chosen:      QUESTIONS[qIdx].options[optIdx]?.label
    })),
    timestamp: new Date().toISOString()
  };
  console.log('[AAPD 教練媒合紀錄]', payload);
  // ── END TRACKING ──────────────────────────────────
}

function retakeQuiz() {
  answers  = [];
  currentQ = 0;
  showScreen('intro');
}
</script>

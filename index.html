<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職涯教練陪跑 · 教練媒合測驗</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #3A71B9;
      --blue-dark:   #234E95;
      --blue-sky:    #4FACF4;
      --blue-pale:   #E4F3FE;
      --blue-light:  #EBF4FE;
      --yellow:      #F6C954;
      --orange:      #ED7738;
      --white:       #FFFFFF;
      --bg:          #F0F7FF;
      --text:        #1A2E4A;
      --muted:       #5C7A9B;
      --subtitle:    #6B97C8;
      --border:      #C8DFF5;
      --green:       #1C7C4A;
      --green-bg:    #D6F5E5;
      --card-shadow: 0px 4px 24px 0px rgba(58,113,185,0.13);
    }

    body {
      font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── PAGE WRAPPER ─── */
    .page {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ─── HERO ─── */
    .hero {
      width: 100vw;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      height: 275px;
      background-color: #3A71B9;
      overflow: hidden;
      flex-shrink: 0;
    }
    /* Lines rendered via inline SVG — no ::before needed */
    .hero::before { display: none; }
    .hero::after  { display: none; }

    /* Hero SVG lines layer */
    .hero-lines {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    /* Top-right ellipse */
    .hero-ellipse-tr {
      position: absolute;
      width: 140px; height: 160px;
      left: 287px; top: -15px;
      background: radial-gradient(ellipse at center, rgba(79,172,244,0.25) 0%, rgba(79,172,244,0) 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    /* Bottom-left ellipse */
    .hero-ellipse-bl {
      position: absolute;
      width: 180px; height: 140px;
      left: -43px; top: 164px;
      background: radial-gradient(ellipse at center, rgba(246,201,84,0.25) 0%, rgba(246,201,84,0) 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    /* Center content stack */
    .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 50px;
      gap: 32px;
      z-index: 1;
    }
    .hero-title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    /* AAPD Logo image */
    .hero-aapd-img {
      width: 73px;
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
    }
    /* AAPD text fallback */
    .hero-aapd-fallback {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.18em;
      display: none;
    }
    /* Title artwork image */
    .hero-title-img {
      width: 228px;
      height: auto;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    /* Title text fallback */
    .hero-title-text {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .hero-title-zh {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 900;
      font-size: 30px;
      color: #FFFFFF;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }
    .hero-title-en {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 12px;
      color: rgba(255,255,255,0.70);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    /* Hero badge pill */
    .hero-badge {
      display: inline-flex;
      align-items: center;
      background: #F6C954;
      color: #234E95;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 100px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

        /* ─── CONTENT AREA ─── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 24px 16px 40px;
    }

    /* ─── SCREENS ─── */
    .screen { display: none; width: 100%; }
    .screen.active { display: block; }

    /* ─── CARD ─── */
    .card {
      width: 100%;
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }
    .card-accent {
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--blue-sky) 55%, var(--yellow) 100%);
    }
    .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── BUTTONS ─── */
    .btn-primary {
      width: 100%;
      background: var(--blue-dark);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-orange {
      width: 100%;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }
    .btn-orange:hover { opacity: 0.88; }


    /* ─── INTRO SCREEN ─── */
    /* ─── TITLE + SUBTITLE 間距（全站共用）─── */
    .title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .intro-title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      color: var(--blue);
    }
    .intro-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--blue);
      line-height: 38px;
      letter-spacing: 0.01em;
      text-align: center;
    }
    .intro-sub {
      font-size: 14px;
      font-weight: 400;
      color: var(--subtitle);
      line-height: 22px;
      text-align: center;
    }
    .intro-sub p { margin: 0; }
    .pills-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    .pill {
      background: var(--blue-pale);
      color: var(--blue);
      border: none;
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ─── QUESTION SCREEN ─── */
    /* Progress pills (6 segments) */
    .progress-pills {
      display: flex;
      gap: 6px;
      align-items: center;
      width: 100%;
    }
    .progress-pill {
      flex: 1;
      height: 6px;
      border-radius: 100px;
      background: var(--border);
      transition: background 0.3s ease;
    }
    .progress-pill.done    { background: var(--blue); }
    .progress-pill.current { background: var(--yellow); }

    .question-text {
      font-size: 26px;
      font-weight: 800;
      color: var(--blue);
      line-height: 38px;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .option-btn {
      width: 100%;
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 24px 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: rgba(35, 78, 149, 0.7);
      text-align: center;
      cursor: pointer;
      line-height: 1.5;
      transition: all 0.15s;
    }
    .option-btn:hover { background: var(--blue-light); border-color: var(--border); color: var(--blue); }
    .option-btn.selected {
      background: var(--blue-light);
      border: 2px solid var(--blue);
      color: var(--blue);
      font-weight: 700;
    }

    /* ─── CALCULATING SCREEN ─── */
    #calc-inner {
      padding: 40px 24px 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .calc-emoji { font-size: 56px; line-height: 1; }
    .calc-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--blue-dark);
      text-align: center;
    }

    /* Three bounce dots */
    .calc-dots {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .calc-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      animation: dotBounce 1.1s ease-in-out infinite;
    }
    .calc-dot:nth-child(1) { background: var(--blue-dark);  animation-delay: 0s; }
    .calc-dot:nth-child(2) { background: var(--blue-sky);   animation-delay: 0.18s; }
    .calc-dot:nth-child(3) { background: var(--yellow);     animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%, 70%, 100% { transform: translateY(0);    opacity: 0.7; }
      35%            { transform: translateY(-9px); opacity: 1;   }
    }

    /* ─── RESULT SCREEN ─── */
    /* Screen itself becomes a flex column so heading sits above card */
    #screen-result.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .result-heading {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      padding: 0 24px;
      text-align: center;
    }
    .result-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--blue-dark);
      text-align: center;
      width: 100%;
      line-height: 1.5;
    }
    .result-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 20px;
      width: 100%;
    }
    /* Card body for result */
    #result-inner {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .mentor-card {
      width: 100%;
      background: transparent;
      border-radius: 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .mentor-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      width: 100%;
    }
    .mentor-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--blue-dark);
      text-align: center;
    }
    .mentor-company {
      font-size: 15px;
      font-weight: 500;
      color: var(--subtitle);
      text-align: center;
    }
    .mentor-avatar {
      width: 200px; height: 200px;
      border-radius: 12px;
      background: #D3D3D3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .mentor-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }
    .mentor-bio {
      font-size: 14px;
      color: var(--text);
      line-height: 26px;
      text-align: left;
      padding-left: 18px;
      width: 100%;
    }
    .mentor-bio li + li {
      margin-top: 4px;
    }
    .mentor-tags { display: none; }
    /* result action buttons */
    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .btn-retake {
      width: 100%;
      background: var(--white);
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s;
    }
    .btn-retake:hover { opacity: 0.75; }

    /* ─── LANG TOGGLE ─── */
    .lang-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.92);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: var(--blue);
      cursor: pointer;
      z-index: 200;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s;
    }
    .lang-toggle:hover { background: var(--blue-light); border-color: var(--blue); }

    /* ─── SLIDE ANIMATION ─── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen.active .card { animation: slideIn 0.25s ease; }
    #screen-result.active .result-heading { animation: slideIn 0.25s ease; }

    /* ─── DESKTOP BRAND PANEL (hidden on mobile/tablet) ─── */
    .brand-panel { display: none; }
    .brand-panel-ellipse-tr,
    .brand-panel-ellipse-bl,
    .brand-panel-content,
    .brand-divider,
    .brand-tagline,
    .brand-desc,
    .brand-pills,
    .brand-pill { display: none; }

    /* ─────────────────────────────────────────────────────
       TABLET  640px – 1023px
    ───────────────────────────────────────────────────── */
    @media (min-width: 640px) {
      .page { max-width: 600px; }
      .hero { height: 320px; }
      .hero-content { padding-top: 62px; gap: 36px; }
      /* Tablet: scale ellipses slightly */
      .hero-ellipse-tr { width: 170px; height: 190px; left: 510px; }
      .hero-ellipse-bl { width: 220px; height: 170px; left: -50px; top: 210px; }
      .hero-title-img { width: 270px; height: 130px; }
      .hero-aapd-img  { width: 88px; height: 20px; object-fit: contain; }
      .hero-badge     { font-size: 17px; padding: 5px 12px; }
      .content        { padding: 28px 20px 52px; }
      .card-body      { padding: 32px; }
      .intro-title    { font-size: 30px; line-height: 44px; text-align: center; }
      .intro-sub      { font-size: 15px; text-align: center; }
      .question-text  { font-size: 28px; line-height: 42px; }
      .mentor-name    { font-size: 26px; }
      .result-title   { font-size: 20px; }
    }

    /* ─────────────────────────────────────────────────────
       DESKTOP  ≥ 1024px  —  2-column layout
    ───────────────────────────────────────────────────── */
    @media (min-width: 1024px) {
      body {
        flex-direction: row;
        align-items: stretch;
        min-height: 100vh;
        background: var(--bg);
      }

      .page {
        max-width: 100%;
        min-height: 100vh;
        flex-direction: row;
        align-items: stretch;
        background: transparent;
      }

      /* ── Hide mobile/tablet hero ── */
      .hero { display: none !important; }

      /* ── Brand panel (left sticky column) ── */
      .brand-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        width: 500px;
        min-width: 420px;
        flex-shrink: 0;
        min-height: 100vh;
        position: sticky;
        top: 0;
        align-self: flex-start;
        height: 100vh;
        background-color: #3A71B9;
        padding: 64px 56px;
        overflow: hidden;
      }
      /* Brand panel lines via SVG child — no ::before needed */
      .brand-panel::before { display: none; }
      .brand-panel::after  { display: none; }

      /* Top-right ellipse */
      .brand-panel-ellipse-tr {
        display: block;
        position: absolute;
        width: 220px; height: 260px;
        right: -50px; top: -30px;
        background: radial-gradient(ellipse at center, rgba(79,172,244,0.25) 0%, rgba(79,172,244,0) 70%);
        border-radius: 50%;
        pointer-events: none;
      }
      /* Bottom-left ellipse */
      .brand-panel-ellipse-bl {
        display: block;
        position: absolute;
        width: 280px; height: 220px;
        left: -70px; bottom: -50px;
        background: radial-gradient(ellipse at center, rgba(246,201,84,0.25) 0%, rgba(246,201,84,0) 70%);
        border-radius: 50%;
        pointer-events: none;
      }
      .brand-panel-content {
        display: flex;
        flex-direction: column;
        gap: 32px;
        align-items: center;
        position: relative;
        z-index: 1;
        width: 100%;
      }
      /* Logo + artwork sizing inside brand panel */
      .brand-panel .hero-title-block { gap: 16px; align-items: center; }
      .brand-panel .hero-aapd-img    { width: 88px; }
      .brand-panel .hero-title-img   { width: 310px; }
      .brand-panel .hero-badge       { font-size: 14px; }

      /* brand-divider / tagline / desc / pills hidden on desktop
         (this info lives in the right card, same as mobile/tablet) */
      .brand-divider,
      .brand-tagline,
      .brand-desc,
      .brand-pills { display: none; }

      /* ── Right quiz column ── */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 64px 40px 80px;
        min-height: 100vh;
      }
      /* Constrain screens to card width */
      .screen { max-width: 440px; }

      /* Widen card & increase padding */
      .card-body { padding: 40px; }

      /* Scale up typography */
      .intro-title   { font-size: 28px; line-height: 42px; }
      .question-text { font-size: 28px; line-height: 42px; }
      .mentor-name   { font-size: 26px; }
      .result-title  { font-size: 20px; }

      /* Result screen: keep flex column on desktop */
      #screen-result.active { display: flex; width: 100%; }
      .result-heading { width: 100%; max-width: 440px; padding: 0 24px; }

      /* Intro card: left-align text same as mobile/tablet */
      #screen-intro .intro-title-block { display: flex; }
      #screen-intro .pills-row         { display: flex; }
    }

    /* ─── QUESTION NAV ─── */
    .question-nav {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .btn-back {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      height: 52px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-back:hover { opacity: 0.7; }
    .btn-back.hidden { display: none; }

    /* ─── QUESTION HINT ─── */
    .question-hint {
      font-size: 13px;
      color: var(--subtitle);
      text-align: center;
      line-height: 1.5;
      margin-top: -4px;
    }
    /* ─── OPTION GRID (2-col) ─── */
    .options-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .options-grid .option-btn {
      font-size: 13px;
      padding: 12px 8px;
    }
    /* ─── TEXT INPUT ─── */
    .text-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .text-input:focus { border-color: var(--blue); }
    .text-input::placeholder { color: #aab8cc; }
  </style>
</head>
<body>

<button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">EN</button>

<div class="page">

  <!-- ═══ DESKTOP BRAND PANEL ═══ -->
  <aside class="brand-panel">
    <!-- Lines: same 11-stroke pattern scaled to full panel height -->
    <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;" viewBox="0 0 500 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <!-- 前 11 條：等比遞減 14.00 → 1.20，12px 間距（桌機加大起始寬度） -->
      <line x1="-80" y1="1"   x2="600" y2="1"   stroke="#234E95" stroke-width="14.00" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="13"  x2="600" y2="13"  stroke="#234E95" stroke-width="10.95" vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="25"  x2="600" y2="25"  stroke="#234E95" stroke-width="8.57"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="37"  x2="600" y2="37"  stroke="#234E95" stroke-width="6.70"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="49"  x2="600" y2="49"  stroke="#234E95" stroke-width="5.24"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="61"  x2="600" y2="61"  stroke="#234E95" stroke-width="4.10"  vector-effect="non-scaling-stroke"/>
      <line x1="-80" y1="73"  x2="600" y2="73"  stroke="#234E95" stroke-width="3.21"  vector-effect="non-scaling-stroke"/>

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let currentQ = 0;
let answers  = {};

// ════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function renderProgressPills() {
  const container = document.getElementById('progress-pills');
  container.innerHTML = '';
  for (let i = 0; i < QUESTIONS.length; i++) {
    const pill = document.createElement('div');
    pill.className = 'progress-pill';
    if (i < currentQ)        pill.classList.add('done');
    else if (i === currentQ) pill.classList.add('current');
    container.appendChild(pill);
  }
}

function renderQuestion() {
  const q    = QUESTIONS[currentQ];
  const lang = currentLang;
  const text = lang === 'en' ? (q.textEn || q.text) : q.text;
  const hint = lang === 'en' ? (q.hintEn !== undefined ? q.hintEn : (q.hint || '')) : (q.hint || '');
  const opts = lang === 'en' ? (q.optionsEn || q.options) : q.options;

  document.getElementById('q-text').textContent = text;
  const hintEl = document.getElementById('q-hint');
  if (hintEl) hintEl.textContent = hint;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  list.classList.remove('options-grid');

  if (q.type === 'text') {
    const ph = lang === 'en' ? (q.placeholderEn || q.placeholder || '') : (q.placeholder || '');
    const input = document.createElement('input');
    input.type = q.inputType || 'text';
    input.placeholder = ph;
    input.className = 'text-input';
    input.value = answers[q.id] || '';
    input.oninput = () => { answers[q.id] = input.value; };
    list.appendChild(input);
    document.getElementById('btn-next').disabled = false;

  } else if (q.type === 'multi') {
    if (q.grid && !(currentLang === 'en' && q.id !== 'q4')) list.classList.add('options-grid');
    opts.forEach((opt, i) => {
      const code = q.codes ? q.codes[i] : opt;
      const selectedCodes = answers[q.id] || [];
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (selectedCodes.includes(code) ? ' selected' : '');
      btn.textContent = opt;
      btn.dataset.code = code;
      btn.onclick = () => toggleOption(q.id, code);
      list.appendChild(btn);
    });
    document.getElementById('btn-next').disabled = (answers[q.id] || []).length === 0;

  } else {
    // single
    opts.forEach((opt, i) => {
      const code = q.codes ? q.codes[i] : opt;
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[q.id] === code ? ' selected' : '');
      btn.textContent = opt;
      btn.dataset.code = code;
      btn.onclick = () => selectOption(q.id, code);
      list.appendChild(btn);
    });
    document.getElementById('btn-next').disabled = !answers[q.id];
  }

  const nextBtn = document.getElementById('btn-next');
  const s = UI_STRINGS[lang];
  nextBtn.textContent = currentQ === QUESTIONS.length - 1 ? s.resultBtn : s.nextBtn;
  document.getElementById('btn-back').classList.toggle('hidden', currentQ === 0);
  renderProgressPills();
}

// ════════════════════════════════════════════════════
//  LANGUAGE TOGGLE
// ════════════════════════════════════════════════════
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  updateStaticStrings();
  if (document.getElementById('screen-question').classList.contains('active')) {
    renderQuestion();
  }
}

function updateStaticStrings() {
  const s = UI_STRINGS[currentLang];
  // Toggle button
  const toggleBtn = document.getElementById('lang-toggle');
  if (toggleBtn) toggleBtn.textContent = s.langToggle;
  // Intro screen
  const introTitle = document.querySelector('.intro-title');
  if (introTitle) introTitle.textContent = s.introTitle;
  const introSubs = document.querySelectorAll('.intro-sub p');
  if (introSubs[0]) introSubs[0].textContent = s.introSub1;
  if (introSubs[1]) introSubs[1].textContent = s.introSub2;
  const startBtn = document.querySelector('button[onclick="startQuiz()"]');
  if (startBtn) startBtn.textContent = s.startBtn;
  // Calculating screen
  const calcTitle = document.querySelector('.calc-title');
  if (calcTitle) calcTitle.textContent = s.calcTitle;
  // Result screen
  const resultTitle = document.querySelector('.result-title');
  if (resultTitle) resultTitle.textContent = s.resultTitle;
  const ctaBtn = document.getElementById('res-cta');
  if (ctaBtn) ctaBtn.textContent = s.ctaBtn;
  const retakeBtn = document.querySelector('.btn-retake');
  if (retakeBtn) retakeBtn.textContent = s.retakeBtn;
  const reportLink = document.querySelector('[data-track="result-cs-link"]');
  if (reportLink) reportLink.textContent = s.reportLink;
  const coachesLink = document.querySelector('[data-track="result-coaches-link"]');
  if (coachesLink) coachesLink.textContent = s.coachesLink;
}

// ════════════════════════════════════════════════════
//  FLOW
// ════════════════════════════════════════════════════
function startQuiz() {
  showScreen('question');
  renderQuestion();
}

function selectOption(qid, value) {
  answers[qid] = value;
  document.querySelectorAll('.option-btn').forEach(btn => {
    const code = btn.dataset.code !== undefined ? btn.dataset.code : btn.textContent;
    btn.classList.toggle('selected', code === value);
  });
  document.getElementById('btn-next').disabled = false;
}

function toggleOption(qid, value) {
  if (!answers[qid]) answers[qid] = [];

  // Mutual exclusivity: "any" clears others; others clear "any"
  if (value === 'any') {
    // Selecting "any" → keep only "any" (or toggle off if already selected)
    if (answers[qid].includes('any')) {
      answers[qid] = [];
    } else {
      answers[qid] = ['any'];
    }
  } else {
    // Selecting a specific option → remove "any" first, then toggle this value
    answers[qid] = answers[qid].filter(v => v !== 'any');
    const idx = answers[qid].indexOf(value);
    if (idx === -1) answers[qid].push(value);
    else answers[qid].splice(idx, 1);
  }

  // Auto-switch to "any" if all 3 style options are selected (q5 only)
  if (qid === 'q5' && !answers[qid].includes('any')) {
    if (['coaching', 'structured', 'direct'].every(c => answers[qid].includes(c))) {
      answers[qid] = ['any'];
    }
  }

  // Re-render selected state using data-code attribute
  document.querySelectorAll('.option-btn').forEach(btn => {
    const code = btn.dataset.code !== undefined ? btn.dataset.code : btn.textContent;
    btn.classList.toggle('selected', answers[qid].includes(code));
  });
  document.getElementById('btn-next').disabled = answers[qid].length === 0;
}

function nextQ() {
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showCalculating();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showCalculating() {
  showScreen('calc');

  // Clear any leftover fade style from previous run
  const calcCard = document.querySelector('#screen-calc .card');
  calcCard.style.transition = '';
  calcCard.style.opacity    = '';
  calcCard.style.transform  = '';

  // Dots animate automatically via CSS — just wait, then fade out → result
  setTimeout(() => {
    calcCard.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    calcCard.style.opacity    = '0';
    calcCard.style.transform  = 'translateY(-10px)';
    setTimeout(showResult, 360);
  }, 1500);
}

// ════════════════════════════════════════════════════
//  MATCHING
// ════════════════════════════════════════════════════
// Bio 轉列點：按換行拆分後渲染成 <li>
function renderBio(el, bio) {
  el.innerHTML = '';
  const lines = (bio || '').split('\n').map(s => s.trim()).filter(Boolean);
  lines.forEach(line => {
    const li = document.createElement('li');
    li.textContent = line;
    el.appendChild(li);
  });
}

function splitTags(str) {
  if (Array.isArray(str)) return str.map(s => String(s).trim()).filter(Boolean);
  return (str || '').split(',').map(s => s.trim()).filter(Boolean);
}

function computeScores() {
  const q1      = answers['q1']       || '';   // career stage code
  const qDomain = answers['q_domain'] || '';   // domain code
  const q2      = answers['q2']       || [];   // service codes
  const q3      = answers['q3']       || [];   // expertise codes
  const q4      = answers['q4']       || [];   // industry codes
  const q5      = answers['q5']       || '';   // style code

  return MENTORS.map(m => {
    // Hard filter: domain (skip if user chose "any")
    if (qDomain && qDomain !== 'any') {
      const domains = splitTags(m.domains);
      if (domains.length > 0 && !domains.includes(qDomain)) {
        return { mentor: m, score: -1 };
      }
    }

    let score = 0;
    // Q1: career stage (weight 10%) — soft bonus, not a hard filter
    if (q1) {
      const stages = splitTags(m.career_stages);
      if (stages.includes(q1)) score += 0.10;
    }

    // Q2: services (weight 35%)
    const svc = splitTags(m.services);
    score += q2.filter(c => svc.includes(c)).length * 0.35;

    // Q3: expertise (weight 30%)
    const exp = splitTags(m.expertise);
    score += q3.filter(c => exp.includes(c)).length * 0.30;

    // Q4: industry (weight 20%) — "any" skips filter
    if (!q4.includes('any') && q4.length > 0) {
      const ind = splitTags(m.industries);
      score += q4.filter(c => ind.includes(c)).length * 0.20;
    }

    // Q5: style (weight 15%) — "any" skips scoring entirely
    if (q5 && q5 !== 'any') {
      const styles = splitTags(m.style);
      if (styles.includes(q5)) score += 0.15;
    }

    return { mentor: m, score };
  })
  .filter(r => r.score >= 0)   // remove hard-filtered
  .sort((a, b) => b.score - a.score);
}

async function showResult() {
  await coachesReady; // 等教練資料載完再計算
  let sorted = computeScores();
  // Fallback: if domain hard filter removed everyone, ignore domain and re-score
  if (sorted.length === 0) {
    sorted = MENTORS.map(m => {
      const q2 = answers['q2'] || [], q3 = answers['q3'] || [],
            q4 = answers['q4'] || [], q5 = answers['q5'] || '';
      let score = 0;
      if (answers['q1']) {
        const stages = splitTags(m.career_stages);
        if (stages.includes(answers['q1'])) score += 0.10;
      }
      score += q2.filter(c => splitTags(m.services).includes(c)).length  * 0.35;
      score += q3.filter(c => splitTags(m.expertise).includes(c)).length * 0.30;
      if (!q4.includes('any') && q4.length > 0)
        score += q4.filter(c => splitTags(m.industries).includes(c)).length * 0.20;
      if (q5 && q5 !== 'any' && splitTags(m.style).includes(q5)) score += 0.15;
      return { mentor: m, score };
    }).sort((a, b) => b.score - a.score);
  }
  const top = sorted[0];
  if (!top) {
    // 極端情況：所有教練都被過濾掉，直接顯示第一位
    console.warn('[AAPD] No matching mentor found, using first mentor as fallback');
    const fallback = MENTORS[0];
    document.getElementById('res-name').textContent    = fallback.name;
    document.getElementById('res-company').textContent = fallback.company;
    renderBio(document.getElementById('res-bio'), fallback.bio);
    document.getElementById('res-cta').onclick = () => window.open(fallback.ctaUrl || '#', '_blank');
    showScreen('result');
    return;
  }

  // Populate result card
  const avatarEl = document.getElementById('res-avatar');
  if (top.mentor.photoUrl) {
    avatarEl.innerHTML = '<img src="' + top.mentor.photoUrl + '" alt="' + top.mentor.name + '" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">';
  } else {
    avatarEl.innerHTML = '';
  }
  document.getElementById('res-name').textContent    = top.mentor.name;
  document.getElementById('res-company').textContent = top.mentor.company;
  renderBio(document.getElementById('res-bio'), top.mentor.bio);
  const ctaBtn = document.getElementById('res-cta');
  ctaBtn.onclick = () => window.open(top.mentor.ctaUrl || 'https://aapd.com.tw/coach-program', '_blank');

  showScreen('result');

  // ── 送出 Analytics ───────────────────────────────
  const payload = {
    mentor_id: top.mentor.id,
    name:      answers['name']  || '',
    email:     answers['email'] || '',
    q1: answers['q1'] || '',
    q2: (answers['q2'] || []).join(', '),
    q3: (answers['q3'] || []).join(', '),
    q4: (answers['q4'] || []).join(', '),
    q5: answers['q5'] || ''
  };
  console.log('[AAPD 教練媒合紀錄]', payload);
  postAnalytics(payload);
  // ─────────────────────────────────────────────────
}

function retakeQuiz() {
  answers  = {};
  currentQ = 0;
  showScreen('intro');
}

// ════════════════════════════════════════════════════
//  GOOGLE SHEETS API
// ════════════════════════════════════════════════════

// 全域 Promise，讓 showResult 等資料載完再計算
let coachesReady = Promise.resolve();

// 頁面載入時背景 fetch 教練資料，取代 placeholder
function loadCoaches() {
  if (!COACHES_API_URL) return;
  coachesReady = (async () => {
    try {
      const res  = await fetch(COACHES_API_URL);
      const data = await res.json();
      if (data.coaches && data.coaches.length > 0) {
        MENTORS = data.coaches;
        console.log('[AAPD] 教練資料已載入，共', MENTORS.length, '位');
      } else {
        console.warn('[AAPD] API 回傳空資料或格式異常', data);
      }
    } catch (err) {
      console.warn('[AAPD] 無法載入教練資料，使用預設 placeholder', err);
    }
  })();
}

// 送出測驗結果到 Analytics sheet（fire-and-forget）
function postAnalytics(payload) {
  if (!COACHES_API_URL) return;
  // 用 text/plain 避免 CORS preflight，Apps Script 仍可用 e.postData.contents 讀取
  fetch(COACHES_API_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body:    JSON.stringify(payload)
  }).catch(() => {}); // 不影響前端流程
}

// 啟動時就開始 fetch，背景進行
loadCoaches();
</script>
